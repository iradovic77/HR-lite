server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — codebook servis
    location /api/codebook/ {
        proxy_pass         http://codebook-service:8080/api/codebook/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # API proxy — identity servis
    location /api/identity/ {
        proxy_pass         http://identity-service:8080/api/identity/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback — sve ostalo ide na index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Kompresija statičnih fajlova
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
