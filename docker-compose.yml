services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-postgres
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: hr-identity
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=hr_db;Username=hr_user;Password=hr_password;Search Path=hr_identity
      - Jwt__Key=super-secret-key-change-in-production-min32chars!
      - Jwt__Issuer=hr-lite
      - Jwt__Audience=hr-lite
    depends_on:
      postgres:
        condition: service_healthy

