services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-postgres
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  hr-lite-api:
    build:
      context: ./hr-lite-api
      dockerfile: Dockerfile
    container_name: hr-lite-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=hr_db;Username=hr_user;Password=hr_password
      - Jwt__Key=super-secret-key-change-in-production-min32chars!
      - Jwt__Issuer=hr-lite
      - Jwt__Audience=hr-lite
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    ports:
      - "3000:80"
    depends_on:
      - hr-lite-api

  pgadmin:
    image: dpage/pgadmin4
    container_name: hr-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hr-lite.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
